name: Automation Test Pipeline

on:
  push:
    branches: 
        - main

  schedule:
        - cron: '0 0 * * *'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.10'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API Tests
        run: pytest -m api -v --html=reports/api_report.html

      - name: Run UI Tests
        run: pytest -m ui -v --html=reports/ui_report.html

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
            name: automation-reports
            path: reports/*.html

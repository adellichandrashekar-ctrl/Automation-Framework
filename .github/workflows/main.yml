name: Automation Test Pipeline

on:
  push:
    branches: 
        - main

  schedule:
        - cron: '0 0 * * *'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.10'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API Tests
        run: pytest -m api -v --alluredir=allure-results

      - name: Run UI Tests
        run: pytest -m ui -v --alluredir=allure-results

      - name: Run DB Tests
        run: pytest -m db -v --alluredir=allure-results

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
            name: allure-results
            path: allure-results
